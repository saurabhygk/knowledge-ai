version: "3.9"

services:
  postgres:
    image: pgvector/pgvector:pg16
    container_name: knowledgeai-postgres
    environment:
      POSTGRES_DB: knowledgeai
      POSTGRES_USER: knowledgeai
      POSTGRES_PASSWORD: secret
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U knowledgeai"]
      interval: 10s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    container_name: knowledgeai-redis
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  minio:
    image: minio/minio:latest
    container_name: knowledgeai-minio
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: minioadmin
      MINIO_ROOT_PASSWORD: minioadmin
    ports:
      - "9000:9000"
      - "9001:9001"
    volumes:
      - minio_data:/data
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:9000/minio/health/live"]
      interval: 30s
      timeout: 20s
      retries: 3

  qdrant:
    image: qdrant/qdrant:latest
    container_name: knowledgeai-qdrant
    ports:
      - "6333:6333"
      - "6334:6334"
    volumes:
      - qdrant_data:/qdrant/storage

  knowledge-api:
    build:
      context: ./knowledge-api
      dockerfile: Dockerfile
    container_name: knowledgeai-api
    environment:
      DATABASE_URL: postgresql://knowledgeai:secret@postgres:5432/knowledgeai
      REDIS_URL: redis://redis:6379
      MINIO_ENDPOINT: minio:9000
      MINIO_ACCESS_KEY: minioadmin
      MINIO_SECRET_KEY: minioadmin
      MINIO_BUCKET: knowledge-ai-docs
      MINIO_SECURE: "false"
      LOG_LEVEL: INFO
    ports:
      - "8080:8080"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      minio:
        condition: service_healthy

  knowledge-processor:
    build:
      context: ./knowledge-processor
      dockerfile: Dockerfile
    container_name: knowledgeai-processor
    env_file:
      - ./knowledge-processor/.env.example
    environment:
      DATABASE_URL: postgresql://knowledgeai:secret@postgres:5432/knowledgeai
      REDIS_URL: redis://redis:6379
      MINIO_ENDPOINT: minio:9000
    ports:
      - "8001:8001"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy

volumes:
  postgres_data:
  minio_data:
  qdrant_data:
