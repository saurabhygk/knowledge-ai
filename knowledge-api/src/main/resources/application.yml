spring:
  application:
    name: knowledge-api

  datasource:
    url: jdbc:postgresql://localhost:5432/knowledgeai
    username: knowledgeai
    password: secret
    hikari:
      maximum-pool-size: 10

  jpa:
    hibernate:
      ddl-auto: validate
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect
        format_sql: true
    open-in-view: false

  flyway:
    enabled: true
    locations: classpath:db/migration

  data:
    redis:
      host: localhost
      port: 6379

  ai:
    openai:
      api-key: ${OPENAI_API_KEY:change-me}
      embedding:
        options:
          model: text-embedding-3-small
    vectorstore:
      pgvector:
        enabled: true
        initialize-schema: false
        dimensions: 1536
        index-type: HNSW
        distance-type: COSINE_DISTANCE

  servlet:
    multipart:
      max-file-size: 50MB
      max-request-size: 52MB

storage:
  minio:
    endpoint: http://localhost:9000
    access-key: minioadmin
    secret-key: minioadmin
    bucket: knowledge-ai-docs

server:
  port: 8080

management:
  endpoints:
    web:
      exposure:
        include: health,info,metrics
  endpoint:
    health:
      show-details: always

logging:
  level:
    com.knowledgeai: DEBUG
    org.springframework.ai: INFO
